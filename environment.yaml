name: modern_gs
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch-cuda=11.8
  - pip
  - pip:
    - torch==2.2.1+cu118
    - torchvision==0.17.1+cu118
    - torchaudio==2.2.1+cu118
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - numpy==1.26.0
    - opencv-python==4.9.0.80
    - plyfile
    - tqdm
    - pyyaml
    - tensorboard
    - scipy
    - pillow
    - lpips
    # - diff-gaussian-rasterization  # Requires submodule
    # - simple-knn                   # Requires submodule

