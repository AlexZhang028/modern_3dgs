data:
  cache_images: true
  data_device: cuda
  eval: false
  images: images
  init_point_cloud_path: ''
  lazy_loading: true
  model_path: output\bar-release
  num_workers: 4
  pin_memory: true
  resolution: 8
  source_path: ..\3DGS_test_data\bar-release
  start_frame: 3190
  test_cameras:
  - '10'
  train_cameras:
  white_background: false
densify:
  densify_from_iter: 500
  densify_grad_threshold: 0.0002
  densify_interval: 100
  densify_until_iter: 15000
  prune_opacity_threshold: 0.005
model:
  mode: freetime
  percent_dense: 0.01
  sh_degree: 3
optim:
  feature_lr: 0.0025
  iterations: 30000
  lambda_dssim: 0.2
  opacity_lr: 0.025
  position_lr_final: 1.6e-06
  position_lr_init: 0.00016
  rotation_lr: 0.001
  scaling_lr: 0.005
  t_lr: 0.0001
  t_scale_lr: 0.005
  velocity_lr: 0.00016
trainer:
  lambda_reg: 1.0
  log_interval: 10
  reg_end_iter: 30000
  relocation_interval: 100
  save_interval: 5000
  test_interval: 5000
