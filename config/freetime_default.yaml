# FreeTimeGS 默认训练配置文件
# 对应 config/config.py 中的 TrainingConfig

# ============================================================================
# 数据配置 (DataConfig)
# ============================================================================
data:
  source_path: ""  # 数据集根目录（必填）
  model_path: "output"  # 模型保存路径
  images: "images"
  resolution: 8  # 默认缩放 1/8
  white_background: false
  
  # 初始点云配置
  init_point_cloud_path: ""  # 自定义初始点云路径（可选），留空则自动搜索或生成
  
  # 资源管理
  data_device: "cuda"
  eval: false
  cache_images: false # 显存优化：如果不缓存图像，每次迭代从 CPU 读取
  num_workers: 0
  pin_memory: true
  lazy_loading: true # 推荐开启，避免一次性加载所有视频帧

# ============================================================================
# 模型配置 (ModelConfig)
# ============================================================================
model:
  sh_degree: 3
  mode: "freetime"  # 启用 Temporal 模式
  percent_dense: 0.01

# ============================================================================
# 优化器配置 (OptimConfig)
# ============================================================================
optim:
  iterations: 30000
  
  # 基础 3DGS 学习率
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  feature_lr: 0.0025
  opacity_lr: 0.025
  scaling_lr: 0.005
  rotation_lr: 0.001
  
  # FreeTimeGS 专用参数 (参照文档 implementation details)
  t_lr: 0.0001        # Time Center (mu_t)
  t_scale_lr: 0.0005   # Duration (s) - 与 scaling_lr 一致
  velocity_lr: 0.00016 # Velocity (v) - 与 position_lr 一致
  
  # 损失权重
  lambda_dssim: 0.2

# ============================================================================
# Densification 配置 (DensificationConfig)
# ============================================================================
densify:
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_interval: 100
  densify_grad_threshold: 0.0002
  
  # Pruning 参数
  prune_opacity_threshold: 0.005 # 配合 Relocation 使用

# ============================================================================
# 训练器配置 (TrainerConfig)
# ============================================================================
trainer:
  save_interval: 5000
  test_interval: 5000 # 减少测试频率节省时间
  log_interval: 10
  
  # FreeTimeGS 特有逻辑控制
  lambda_reg: 1.0          # 4D Regularization 初始权重
  reg_end_iter: 3000       # Regularization 结束迭代
  relocation_interval: 100 # Relocation 周期
